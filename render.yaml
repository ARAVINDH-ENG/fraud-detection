services:
  - type: web
    name: fraudshield-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python training/train.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///fraud.db
    disk:
      name: fraud-storage
      mountPath: /app
      sizeGB: 1
