name: FraudShield CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Lint
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,data,models

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t fraudshield:${{ github.sha }} .
      - name: Smoke test
        run: |
          docker run -d -p 8000:8000 -e GEMINI_API_KEY=test --name fraud-test fraudshield:${{ github.sha }}
          sleep 8
          curl -f http://localhost:8000/health
          docker stop fraud-test
